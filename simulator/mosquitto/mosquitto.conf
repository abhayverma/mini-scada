# mosquitto.conf
# Configuração do broker MQTT para o simulador SCADA

# ── Listener MQTT padrão ──────────────────────────────────────────────
listener 1883
protocol mqtt

# ── Listener WebSocket (para clientes web/HMI) ────────────────────────
listener 9001
protocol websockets

# ── Autenticação ──────────────────────────────────────────────────────
# Sem autenticação para facilitar o desafio.
# Em produção, usar password_file e TLS.
allow_anonymous true

# ── Persistência ─────────────────────────────────────────────────────
persistence true
persistence_location /mosquitto/data/

# ── Logs ─────────────────────────────────────────────────────────────
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information

# ── Limites de conexão ────────────────────────────────────────────────
max_connections 100
max_inflight_messages 50
max_packet_size 65536
